services:
  simulator:
    image: golang:1.22
    working_dir: /workspace/services/simulator
    command: sh -c "go mod download && go run ./cmd/simulator"
    environment:
      SIMULATOR_SEED: "42"
    ports:
      - "8080:8080"
    volumes:
      - ..:/workspace
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 20

  bff:
    image: python:3.12-slim
    working_dir: /workspace/services/bff
    command: sh -c "pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment:
      SIMULATOR_HTTP_URL: http://simulator:8080
      SIMULATOR_WS_URL: ws://simulator:8080/stream
      SIMULATOR_SCENARIO_CONTROL_URL: http://simulator:8080/scenario/control
    ports:
      - "8000:8000"
    volumes:
      - ..:/workspace
    depends_on:
      simulator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    image: node:22
    working_dir: /workspace
    command: sh -c "corepack enable && pnpm install && pnpm --dir apps/web dev --host 0.0.0.0 --port 5173"
    environment:
      VITE_BFF_HTTP_URL: http://localhost:8000
      VITE_BFF_STREAM_URL: ws://localhost:8000/api/stream
    ports:
      - "5173:5173"
    volumes:
      - ..:/workspace
    depends_on:
      bff:
        condition: service_healthy
